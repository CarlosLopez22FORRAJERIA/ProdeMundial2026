{% extends "base.html" %}
{% block content %}
<section class="login-layout">
  <div class="login-copy">
    <p class="eyebrow">Primer ingreso</p>
    <h1>Elegí tu clave</h1>
    <p>El admin creó tu acceso con una clave temporal. Antes de participar, definí una contraseña propia.</p>
  </div>
  <form class="card form-card" method="post" action="{{ url_for('change_password') }}">
    <div class="card-head">
      <h2>Nueva clave</h2>
      <span class="status-pill">Cuenta</span>
    </div>
    <label>Clave nueva
      <span class="password-field">
        <input name="password" type="password" autocomplete="new-password" required>
        <button type="button" class="password-toggle" data-toggle-password aria-label="Mostrar clave"><span>Mostrar clave</span></button>
      </span>
    </label>
    <label>Repetir clave
      <span class="password-field">
        <input name="confirm" type="password" autocomplete="new-password" required>
        <button type="button" class="password-toggle" data-toggle-password aria-label="Mostrar clave"><span>Mostrar clave</span></button>
      </span>
    </label>
    <button type="submit">Guardar clave</button>
  </form>
</section>
{% endblock %}
